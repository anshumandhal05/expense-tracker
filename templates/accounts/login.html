{% extends 'base.html' %}
{% block title %}Login — ExpenseIQ{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-wallet"></i>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your ExpenseIQ account</p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Username" required
                    autofocus />
                <label for="id_username"><i class="fa-solid fa-user me-2"></i>Username</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" name="password" id="id_password" class="form-control" placeholder="Password"
                    required />
                <label for="id_password"><i class="fa-solid fa-lock me-2"></i>Password</label>
            </div>
            <button type="submit" class="btn-auth-submit">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Create one →</a>
        </div>
    </div>
    <div class="auth-decoration">
        <div class="deco-circle deco-1"></div>
        <div class="deco-circle deco-2"></div>
        <div class="deco-circle deco-3"></div>
    </div>
</div>
{% endblock %}
